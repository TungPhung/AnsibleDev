---
- name: Update and Upgrade Debian Systems
  hosts: all 
  become: true
  gather_facts: true

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600  # Skip if cache is less than 1 hour old

    - name: Upgrade all packages (apt upgrade)
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      reboot:
        msg: "Reboot triggered by playbook after package upgrade"
        reboot_timeout: 120
      when: reboot_required.stat.exists
